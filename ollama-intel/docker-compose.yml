services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Mantiene los modelos en memoria por 24 horas en lugar de 5 min
      - OLLAMA_KEEP_ALIVE=24h
      # Optimización para CPUs Intel (Uso de AVX2)
      - OLLAMA_NUM_PARALLEL=1
    # Quitamos la sección de NVIDIA si usás el i5-12500T nativo
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "echo 'Esperando a Ollama...' &&
             sleep 15 &&
             echo 'Prioridad: Llama 3.1 8B' &&
             ollama pull gemma4:e2b &&
             # Forzamos que se cargue en memoria de inmediato
             ollama run gemma4:e2b 'Hola' &&
             echo 'Descargando el resto en segundo plano...' &&
             ollama pull llama3.1:8b &&
             echo 'Todos los modelos listos!'"
    restart: "no"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  openwebui_data:
